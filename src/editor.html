<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="editor.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quill</title>
    <script type="module" src="/editor.js" defer></script>
  </head>
  <body>
    <main class="chat">
      <header class="titlebar" data-tauri-drag-region>
        <div class="brand" data-tauri-drag-region>
          <span class="mark" data-tauri-drag-region>✒</span>
          <span class="wordmark" data-tauri-drag-region>Quill</span>
        </div>
        <div class="win-controls">
          <button id="settings-btn" class="win-btn" title="Настройки">&#x2699;</button>
          <button id="close" class="win-btn win-close" title="Скрыть (Esc)">&#x2715;</button>
        </div>
      </header>

      <!-- The conversation: your text as a bubble, the correction below it,
           day separators between calendar days. Click any bubble to copy it.
           Empty when there's no history — nothing to greet you with. -->
      <div id="log" class="log"></div>

      <form id="composer" class="composer">
        <textarea id="input" rows="1" spellcheck="false"
                  placeholder="Напиши или вставь текст…  Enter — отправить"></textarea>
        <button id="send" class="send" type="submit" title="Отправить (Enter)" aria-label="Отправить">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M8 13V3.5"/><path d="M3.8 7.2 8 3l4.2 4.2"/></svg>
        </button>
      </form>

      <!-- Settings live in this same window as an overlay (Ribbit-style): the
           gear flips this over the chat, nothing opens a second window. -->
      <div id="settings-panel" class="panel" style="display:none">
        <div class="panel-head">
          <div class="panel-title">
            <span>Настройки</span>
            <span id="status-detail" class="status-detail idle"></span>
          </div>
          <button id="settings-close" class="win-btn" title="Назад в чат (Esc)">&#x2715;</button>
        </div>
        <div class="settings-body">
          <div class="setting-row">
            <span class="setting-label">Hotkey</span>
            <kbd id="shortcut-display" title="Нажми, чтобы изменить">⌃⌥E</kbd>
          </div>
          <div class="setting-row">
            <label class="setting-label" for="provider-select">Model</label>
            <select id="provider-select"></select>
          </div>
          <div class="setting-row">
            <label class="setting-label" for="key-input">API key</label>
            <div class="key-field">
              <input type="password" id="key-input" placeholder="вставь токен" autocomplete="off" />
              <span id="key-saved" class="saved" style="display:none">
                <span class="check">✓</span> сохранён <a id="key-edit" class="link">изменить</a>
              </span>
            </div>
          </div>
          <div class="setting-row">
            <span class="setting-label">Debug log</span>
            <button id="debug-btn" class="ghost" title="Debug log">&gt;_</button>
          </div>
          <!-- Update: the button shows the download percent and auto-installs;
               the chat's gear glows green when one is waiting (Ribbit-style). -->
          <div class="setting-row">
            <span class="setting-label" id="version">v0.0.0</span>
            <button id="update-btn" class="ghost" title="Проверить и установить обновление">check update</button>
          </div>
          <p class="settings-note">История правок хранится только на этом компьютере.</p>
        </div>
      </div>

      <!-- Debug log overlay (sits above settings) -->
      <div id="debug-panel" class="panel" style="display:none">
        <div class="panel-head">
          <span>debug log</span>
          <button id="debug-close" class="win-btn" title="Закрыть">&#x2715;</button>
        </div>
        <pre id="debug-content"></pre>
      </div>
    </main>
  </body>
</html>
