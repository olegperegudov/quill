<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="editor.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quill</title>
    <script type="module" src="/editor.js" defer></script>
  </head>
  <body>
    <main class="chat">
      <!-- Titlebar stays put across every view, so the gear is always reachable
           (the gear toggles chat ↔ settings — Ribbit-style). -->
      <header class="titlebar" data-tauri-drag-region>
        <div class="brand" data-tauri-drag-region>
          <span class="mark" data-tauri-drag-region>✒</span>
          <div class="brand-text" data-tauri-drag-region>
            <span class="wordmark" data-tauri-drag-region>Quill</span>
            <span id="status-detail" class="status-detail idle" data-tauri-drag-region></span>
          </div>
        </div>
        <div class="win-controls">
          <button id="settings-btn" class="win-btn" title="Chat / settings">&#x2699;</button>
          <button id="close" class="win-btn win-close" title="Hide (Esc)">&#x2715;</button>
        </div>
      </header>

      <!-- View: chat. Your text as a bubble, the correction below it, day
           separators between days. Click any bubble to copy. Empty = nothing. -->
      <div id="log" class="log"></div>
      <form id="composer" class="composer">
        <textarea id="input" rows="1" spellcheck="false"
                  placeholder="Type or paste text…  Enter to send"></textarea>
        <button id="send" class="send" type="submit" title="Send (Enter)" aria-label="Send">
          <svg class="i-send" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M8 13V3.5"/><path d="M3.8 7.2 8 3l4.2 4.2"/></svg>
          <span class="i-stop" aria-hidden="true"></span>
        </button>
      </form>

      <!-- View: settings. Replaces the chat body; the titlebar (with the gear)
           stays above, so one more click on the gear flips back to the chat. -->
      <section id="settings-panel" class="view-panel" style="display:none">
        <div class="setting-row">
          <span class="setting-label">Hotkey</span>
          <kbd id="shortcut-display" title="Click to change">⌃⌥E</kbd>
        </div>
        <!-- Models: an ordered stack. The top card runs; if it rate-limits or
             goes down, the next one takes over. Order = priority. -->
        <div class="setting-row setting-row--head">
          <span class="setting-label">Models</span>
          <span class="setting-note">top one runs · next covers it</span>
        </div>
        <div id="provider-stack" class="provider-stack"></div>
        <div class="setting-row fallback-knobs">
          <span class="setting-label">Fall back</span>
          <span class="knobs">
            after <input type="number" id="fb-threshold" min="1" max="100" title="Consecutive failures before switching" />
            fails · retry the first in
            <input type="number" id="fb-cooldown" min="1" max="1440" title="Minutes on a backup before retrying the first model" /> min
          </span>
        </div>
        <div class="setting-row">
          <span class="setting-label">Debug log</span>
          <button id="debug-btn" class="ghost" title="Debug log">&gt;_</button>
        </div>
        <!-- Update: the button shows the download percent and auto-installs; the
             gear glows green when one is waiting (Ribbit-style). -->
        <div class="setting-row">
          <span class="setting-label" id="version">v0.0.0</span>
          <button id="update-btn" class="ghost" title="Check for and install an update">check update</button>
        </div>
      </section>

      <!-- View: debug log (opened from settings). -->
      <div id="debug-panel" class="view-panel debug-view" style="display:none">
        <div class="panel-head">
          <span>debug log</span>
          <button id="debug-close" class="win-btn" title="Back">&#x2715;</button>
        </div>
        <pre id="debug-content"></pre>
      </div>
    </main>
  </body>
</html>
