<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quill</title>
    <script type="module" src="/main.js" defer></script>
  </head>
  <body>
    <main class="container">
      <header class="titlebar" data-tauri-drag-region>
        <div class="brand" data-tauri-drag-region>
          <span class="mark" data-tauri-drag-region>✒</span>
          <span class="wordmark" data-tauri-drag-region>Quill</span>
        </div>
        <div class="win-controls">
          <button id="win-min" class="win-btn" title="Minimize">&#x2212;</button>
          <button id="win-close" class="win-btn win-close" title="Close to tray">&#x2715;</button>
        </div>
      </header>

      <!-- Live status of the most recent correction -->
      <div id="status" class="status idle">
        <span id="status-dot" class="dot"></span>
        <span id="status-text">Ready</span>
      </div>

      <!-- How it works: the hotkey is the whole interface -->
      <section class="howto">
        Select text in any app, then press
        <kbd id="shortcut-display" title="Click to change">ctrl+alt+e</kbd>
        to polish it.
      </section>

      <!-- Provider + key -->
      <section class="card">
        <div class="row">
          <label class="label" for="provider-select">Model</label>
          <select id="provider-select"></select>
        </div>
        <div class="row">
          <label class="label" for="key-input">API key</label>
          <div class="key-field">
            <input type="password" id="key-input" placeholder="paste token" autocomplete="off" />
            <span id="key-saved" class="saved" style="display:none">
              <span class="check">✓</span> saved <a id="key-edit" class="link">change</a>
            </span>
          </div>
        </div>
      </section>

      <!-- Recent corrections -->
      <section class="history">
        <div class="history-head">
          <span>Recent</span>
          <button id="history-clear-hint" class="muted" title="Corrections are kept locally only" tabindex="-1">local only</button>
        </div>
        <div id="history-list" class="history-list"></div>
        <div id="history-empty" class="history-empty">Nothing yet — your corrections will show up here.</div>
      </section>

      <footer class="footer">
        <a id="version" class="muted link" href="#" title="changelog">v0.0.0</a>
        <div class="footer-right">
          <button id="debug-btn" class="ghost" title="Debug log">&gt;_</button>
          <button id="update-btn" class="ghost" title="Check for updates">check update</button>
        </div>
      </footer>

      <!-- Debug log overlay -->
      <div id="debug-panel" class="panel" style="display:none">
        <div class="panel-head">
          <span>debug log</span>
          <button id="debug-close" class="win-btn">&times;</button>
        </div>
        <pre id="debug-content"></pre>
      </div>
    </main>
  </body>
</html>
