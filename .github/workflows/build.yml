name: Build Quill

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Auto-bump patch version, commit, and tag
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      skipped: ${{ steps.bump.outputs.skipped }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 2

      - name: Auto-bump version
        id: bump
        run: |
          # Read current version from tauri.conf.json
          CURRENT=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
          echo "Current version: $CURRENT"

          # Check if this commit already has a tag (avoid re-bumping version commits)
          if git describe --exact-match HEAD 2>/dev/null; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "Commit already tagged, skipping"
            exit 0
          fi

          # Check if last commit was a version bump (avoid infinite loop)
          LAST_MSG=$(git log -1 --pretty=%s)
          if [[ "$LAST_MSG" == v* ]] || [[ "$LAST_MSG" == *"auto-bump"* ]]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "Last commit was version bump, skipping"
            exit 0
          fi

          # Bump patch version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          NEW="$MAJOR.$MINOR.$PATCH"
          TAG="v$NEW"
          echo "Bumping to: $NEW"

          # Update version in all files
          python3 -c "
          import json
          for f in ['src-tauri/tauri.conf.json']:
              d = json.load(open(f))
              d['version'] = '$NEW'
              json.dump(d, open(f, 'w'), indent=2)
              print(f'Updated {f}')
          "

          sed -i "s/^version = \"$CURRENT\"/version = \"$NEW\"/" src-tauri/Cargo.toml
          # The UI reads its version at runtime via get_current_version
          # (CARGO_PKG_VERSION) — no HTML placeholder to bump here.

          # Commit and tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "$TAG auto-bump"
          git tag "$TAG"
          git push origin main "$TAG"

          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "skipped=false" >> "$GITHUB_OUTPUT"

  # Run JS unit tests before any platform build. Rust tests run inside each
  # platform build (below) so we don't need to install Linux GTK deps just
  # to compile the Tauri crate on ubuntu.
  test:
    needs: version
    if: needs.version.outputs.skipped != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install npm dependencies
        run: npm install

      - name: JS unit tests (vitest)
        run: npm test

  build-windows:
    needs: [version, test]
    if: needs.version.outputs.skipped != 'true'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm install

      - name: Rust unit tests
        working-directory: src-tauri
        # Use absolute path — macos-latest has a `cargo` shim earlier in PATH
        # that ignores rustup syntax; dtolnay installs the real cargo here.
        shell: bash
        run: "$HOME/.cargo/bin/cargo test --lib"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          args: --target x86_64-pc-windows-msvc --bundles nsis
          tagName: ${{ needs.version.outputs.tag }}
          releaseName: Quill ${{ needs.version.outputs.tag }}
          releaseBody: "See the assets below to download and install."
          releaseDraft: false
          prerelease: false

      # Re-upload the installer under a stable, version-less name so the
      # README "Download for Windows" button can link straight to the file
      # (releases/latest/download/<name>) and never break on a version bump.
      - name: Publish stable-named Windows installer
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          exe=$(ls src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe | head -1)
          cp "$exe" Quill_Windows_Setup.exe
          gh release upload "$TAG" Quill_Windows_Setup.exe --clobber --repo "$GITHUB_REPOSITORY"

  build-macos:
    needs: [version, test]
    if: needs.version.outputs.skipped != 'true'
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm install

      - name: Rust unit tests
        working-directory: src-tauri
        # Use absolute path — macos-latest has a `cargo` shim earlier in PATH
        # that ignores rustup syntax; dtolnay installs the real cargo here.
        shell: bash
        run: "$HOME/.cargo/bin/cargo test --lib"

      # A self-signed cert only counts as a *valid* codesigning identity once its
      # root is trusted. Until then `security find-identity -v -p codesigning`
      # omits it, codesign reports "no identity found", and Tauri's bundler dies
      # with "failed to resolve signing identity". tauri-action's own
      # APPLE_CERTIFICATE import does NOT add trust, so we build the keychain
      # ourselves and trust the cert as a codeSign root (passwordless sudo on the
      # runner → no GUI auth), then hand the bundler only APPLE_SIGNING_IDENTITY.
      - name: Set up code-signing keychain (self-signed, trusted)
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/quill-signing.keychain-db"
          KEYCHAIN_PWD="$(openssl rand -base64 24)"
          P12="$RUNNER_TEMP/quill.p12"
          CERT="$RUNNER_TEMP/quill-cert.pem"

          printf '%s' "$APPLE_CERTIFICATE" | openssl base64 -d -A > "$P12"

          # Dedicated keychain holds the signing identity (cert + private key).
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security import "$P12" -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          # Let codesign use the private key without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PWD" "$KEYCHAIN" >/dev/null

          # Our keychain first on the search list so the bundler finds the key.
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | tr -d '"')

          # Trust the self-signed cert as a codeSign root in the System keychain.
          security find-certificate -c "$APPLE_SIGNING_IDENTITY" -p "$KEYCHAIN" > "$CERT"
          sudo security add-trusted-cert -d -r trustRoot -p codeSign \
            -k /Library/Keychains/System.keychain "$CERT"

          echo "Valid codesigning identities after trust:"
          security find-identity -v -p codesigning
          security find-identity -v -p codesigning | grep -q "$APPLE_SIGNING_IDENTITY" \
            || { echo "::error::signing identity '$APPLE_SIGNING_IDENTITY' did not resolve"; exit 1; }

      - name: Build Tauri app (Apple Silicon)
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          # Stable self-signed code signing: the trusted keychain is prepared in
          # the step above. Anchoring the signature to the cert (not the cdhash)
          # keeps the macOS Accessibility grant alive across updates. Not
          # notarized (no APPLE_ID) — first launch still needs right-click→Open.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          args: --target aarch64-apple-darwin --bundles app,dmg
          tagName: ${{ needs.version.outputs.tag }}
          releaseName: Quill ${{ needs.version.outputs.tag }}
          releaseBody: "See the assets below to download and install."
          releaseDraft: false
          prerelease: false

      - name: Build Tauri app (Intel)
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          # Signs with the trusted self-signed identity from the keychain set up
          # before the Apple Silicon build (same runner, persists across steps).
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          args: --target x86_64-apple-darwin --bundles app,dmg
          tagName: ${{ needs.version.outputs.tag }}
          releaseName: Quill ${{ needs.version.outputs.tag }}
          releaseBody: "See the assets below to download and install."
          releaseDraft: false
          prerelease: false

      # Stable, version-less copies for the README download buttons (both
      # Macs). Direct links: releases/latest/download/Quill_macOS_*.dmg.
      - name: Publish stable-named macOS installers
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          arm=$(ls src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg | head -1)
          intel=$(ls src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg | head -1)
          cp "$arm" Quill_macOS_AppleSilicon.dmg
          cp "$intel" Quill_macOS_Intel.dmg
          gh release upload "$TAG" Quill_macOS_AppleSilicon.dmg Quill_macOS_Intel.dmg --clobber --repo "$GITHUB_REPOSITORY"
